<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Catch the Weird StockPhoto Guy</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="screen">
      <h1>Catch the Weird StockPhoto Guy</h1>
      <button class="btn" id="start-btn">Play Game</button>
    </div>

    <div class="screen">
      <h1>Who is your favorite weird StockPhoto guy?</h1>
      <ul class="insects-list">
        <li>
          <button class="choose-insect-btn">
            <p>Devious</p>
            <img src="images/1.png" alt="Devious">
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>Forehead</p>
            <img
               src="images/6.png"
               alt="Forehead"
               />
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>Duck Man</p>
            <img
               src="images/4.png"
               alt="DuckMan"
               />
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>Glasses</p>
            <img
               src="images/5.png"
               alt="Glasses"
               />
          </button>
        </li>
          <li>
          <button class="choose-insect-btn">
            <p>Hacker</p>
            <img
               src="images/2.png"
               alt="Hacker"
               />
          </button>
        </li>
          <li>
          <button class="choose-insect-btn">
            <p>Rage</p>
            <img
               src="images/3.png"
               alt="Rage"
               />
          </button>
        </li>
      </ul>
    </div>

    <div class="screen game-container" id="game-container">
      <h3 id="time" class="time">Time: 00:00</h3>
      <h3 id="score" class="score">Score: 0</h3>
      <h5 id="message" class="message">
        They are everlasting <br>
        Your efforts are fruitless
      </h5>
    </div>
  </body>
</html>
